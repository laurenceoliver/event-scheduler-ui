name: Deploy to GCP VM

on:
  push:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test -- --watchAll=false

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Deploy to GCP VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.GCP_VM_IP }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          script: |
            # Clone if not exists, otherwise pull
            if [ ! -d "/home/laurenceoliverhernandez/event-scheduler-ui" ]; then
              git clone git@github.com:laurenceoliver/event-scheduler-ui.git /home/laurenceoliverhernandez/event-scheduler-ui
            fi
            cd /home/laurenceoliverhernandez/event-scheduler-ui
            git pull origin master
            docker stop event-scheduler-ui 2>/dev/null || true
            docker rm event-scheduler-ui 2>/dev/null || true
            docker build -t event-scheduler-ui:latest .
            docker run -d --name event-scheduler-ui -p 3000:3000 event-scheduler-ui:latest
